<!-- Modal -->
<div id="imgModal" class="modal">
    <span class="close" onclick="closeModal()">&times;</span>
    <img class="modal-content" id="modalImg">
</div>

<!-- Navbar -->
<header>
    <div class="navbar">

        <div class="nav-destination">
            <i class="fa-solid fa-map-location-dot"></i>

        <div class="nav-content">
